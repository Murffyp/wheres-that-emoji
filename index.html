<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>emoji//search</title>
<style>
  
  @font-face {
    font-family: 'DM Mono';
    src: url('fonts/DMMono-Regular.ttf');
    font-weight: 400;
  }
  @font-face {
    font-family: 'DM Mono';
    src: url('fonts/DMMono-Medium.ttf');
    font-weight: 500;
  }
  @font-face {
    font-family: 'Syne';
    src: url('fonts/Syne-Bold.ttf');
    font-weight: 700;
  }
  @font-face {
    font-family: 'Syne';
    src: url('fonts/Syne-ExtraBold.ttf');
    font-weight: 800;
  }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #7c6af7;
    --accent2: #f76a8f;
    --text: #e2e0f0;
    --muted: #5a5870;
    --card: #13131c;
    --card-hover: #1a1a28;
    --glow: rgba(124, 106, 247, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    /*max-width: 960px;*/
    max-width: 91vw;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  header { 
    margin-bottom: 24px; 
    }
    
  .flex {
    display: flex;
    flex-direction: row;
    flex-wrap: nowrap;  
    justify-content: normal;
    align-items: center;
    align-content: normal;
   }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .logo span { color: var(--accent); }

  .svg {
      dispay: flex;
      width: 150px;
      height: auto;
      margin-right: 15px;
      margin-left: 10vw;
  }
  .svg-black {
      background: ;
      dispay: flex;
      width: 150px;
      height: auto;
      margin-right: 15px;
  }      

  h2 {
    font-family: 'Syne', sans-serif;
/*    font-size: 35px;*/
    font-size: clamp(2rem, 2vw, 2.5rem);
    font-weight: 800;
    line-height: 1;
    letter-spacing: 0.2em;
    margin-bottom: 12px;
  }


/*  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, var(--text) 0%, var(--accent) 60%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }*/

  .logo1 {
    font-family: 'Syne', sans-serif;
    /*font-size: 35x;*/
    font-size: clamp(2rem, 2vw, 2.5rem);
    font-weight: 800;
    line-height: 1;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    margin-top: 16px;
  }

  .logo2 {
    font-family: 'Syne', sans-serif;
    font-size: 35px;
    /*font-size: clamp(2rem, 5vw, 3.0rem);*/
    font-weight: 800;
    line-height: 1;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
    margin-top: 16px;
  }


  .subtitle {
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 0.05em;
    margin-top: 15px;
    margin-left: calc(10vw + 10px);
  }

  .subtitle span { color: var(--accent); }

  .search-wrap {
    position: relative;
    margin-bottom: 16px;
  }

  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 20px;
    pointer-events: none;
    z-index: 1;
  }

  #search {
    width: 100%;
    padding: 18px 18px 18px 52px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  #search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--glow);
  }

  #search::placeholder { color: var(--muted); }

  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .filter-btn {
    padding: 6px 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .stats {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-bottom: 0px;
    /*margin-bottom: 20px; WAS MAYBE CHANGE BACK AFTERE CHECK WITH CLAUDE AS PURPOSE OF IT*/
    height: 16px;
  }

  .stats span { color: var(--accent); }

  #results {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px;
  }

  .emoji-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px 12px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }

  .emoji-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--glow), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .emoji-card:hover {
    border-color: var(--accent);
    background: var(--card-hover);
    transform: translateY(-2px);
  }

  .emoji-card:hover::before { opacity: 1; }

  .emoji-card:active:hover {
    transform: scale(0.95);
    transition: transform 100ms ease;
  }

/*  .emoji-card.copied {
    border-color: var(--accent2);
    animation: flash 0.4s ease;
  }

  @keyframes flash {
    0% { background: var(--card); }
    50% { background: rgba(247, 106, 143, 0.15); }
    100% { background: var(--card-hover); }
  }*/

  .emoji-glyph {
    font-size: 2.2rem;
    line-height: 1;
    filter: drop-shadow(0 2px 8px rgba(124,106,247,0.3));
    transition: transform 0.15s;
  }

  .emoji-card:hover .emoji-glyph { transform: scale(1.15); }

  .emoji-info { width: 100%; text-align: center; }

  .emoji-desc {
    font-size: 13px;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .emoji-code { font-size: 12px; color: #aaaaaa; letter-spacing: 0.05em; }

  .emoji-subgroup {
    font-size: 11px;
    color: var(--accent);
    opacity: 0.7;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  #toast {
    position: fixed;
    /*bottom: 32px;*/
    bottom: 44.5%;
    left: 50%;
    /*remove upward transition whn appears*/
    /*transform: translateX(-50%) translateY(20px);*/
    background: var(--accent);
    color: white;
    padding: 10px 20px;
    border-radius: 2px;
    font-size: 12px;
    letter-spacing: 0.08em;
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
  }

  #toast.show { opacity: 1; }
/*  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }  OLD */

  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty .big { font-size: 3rem; margin-bottom: 12px; }
  .empty p { font-size: 12px; letter-spacing: 0.05em; }

  .loading {
    text-align: center;
    padding: 60px;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.1em;
    grid-column: 1 / -1;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
</style>
</head>

<script>
let ALL_EMOJIS = [];
let currentFilter = 'all';
let searchTimeout = null;

async function loadEmojis() {
  try {
    const res = await fetch('/api/emojis');
    ALL_EMOJIS = await res.json();
    document.getElementById('total').textContent = ALL_EMOJIS.length.toLocaleString();
    buildFilters();
    render('', 'all');
  } catch(e) {
    document.getElementById('results').innerHTML = '<div class="empty"><div class="big">⚠️</div><p>failed to load emojis.json</p></div>';
  }
}

function buildFilters() {
  const groups = [...new Set(ALL_EMOJIS.map(e => e.group))];
  const container = document.getElementById('filters');
  groups.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.filter = g;
    btn.textContent = g.replace(' & ', ' ');
    container.appendChild(btn);
  });
  container.addEventListener('click', e => {
    if (!e.target.classList.contains('filter-btn')) return;
    container.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    currentFilter = e.target.dataset.filter;
    render(document.getElementById('search').value, currentFilter);
  });
}

function fuzzyScore(query, emoji) {
  if (!query) return 1;
  const q = query.toLowerCase();
  const desc = emoji.description.toLowerCase();
  const group = emoji.group.toLowerCase();
  const sub = emoji.subgroup.toLowerCase();
  const code = emoji.code_point.toLowerCase();
  const keywords = (emoji.keywords || []).join(' ').toLowerCase();
  const tags = (emoji.tags || []).join(' ').toLowerCase();



  if (desc === q) return 100;
  if (desc.startsWith(q)) return 80;
  if (desc.includes(' ' + q)) return 65;
  if (desc.includes(q)) return 45;
  if (keywords.includes(q)) return 55;
  if (tags.includes(q)) return 50;
  if (sub.includes(q)) return 25;
  if (group.includes(q)) return 15;
  if (code.includes(q)) return 10;

  let idx = 0;
  for (const ch of q) {
    const f = desc.indexOf(ch, idx);
    if (f === -1) return 0;
    idx = f + 1;
  }
  return 1;
}

function render(query, filter) {
  const q = query.trim();
  let results = ALL_EMOJIS;

  if (filter !== 'all') {
    results = results.filter(e => e.group === filter);
  }

  if (q) {
    results = results
      .map(e => ({ ...e, _score: fuzzyScore(q, e) }))
      .filter(e => e._score > 0)
      .sort((a, b) => b._score - a._score);
  }

  const stats = document.getElementById('stats');
  if (q || filter !== 'all') {
    stats.innerHTML = `<span>${results.length}</span> result${results.length !== 1 ? 's' : ''}${q ? ` for "<span>${q}</span>"` : ''}`;
  } else {
    stats.innerHTML = '';
  }

  const container = document.getElementById('results');

  if (results.length === 0) {
    container.innerHTML = '<div class="empty"><div class="big">🔍</div><p>no emojis found &nbsp;·&nbsp; try a different search</p></div>';
    return;
  }

  const display = results.slice(0, 200);
  container.innerHTML = display.map(e => `
    <div class="emoji-card" data-emoji="${e.emoji}" title="${e.description}&#10;${e.code_point}&#10;${e.group} › ${e.subgroup}">
      <div class="emoji-glyph">${e.emoji}</div>
      <div class="emoji-info">
        <div class="emoji-desc">${e.description.replace(/^E[\d.]+ /, '')}</div>
        <div class="emoji-code">${e.code_point.split(' ')[0]}</div>
        <div class="emoji-subgroup">${e.subgroup}</div>
      </div>
    </div>
  `).join('');

  if (results.length > 200) {
    container.innerHTML += `<div class="empty" style="padding:20px"><p>showing 200 of <span style="color:var(--accent)">${results.length}</span> — refine your search</p></div>`;
  }
}

document.getElementById('results').addEventListener('click', e => {
  const card = e.target.closest('.emoji-card');
  if (!card) return;
  const emoji = card.dataset.emoji;

  const doCopy = () => {
    if (navigator.clipboard && window.isSecureContext) {
      return navigator.clipboard.writeText(emoji);
    } else {
      // fallback for non-https (local network IP)
      const ta = document.createElement('textarea');
      ta.value = emoji;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      return Promise.resolve();
    }
  };

  doCopy().then(() => {
    card.classList.add('copied');
    setTimeout(() => card.classList.remove('copied'), 500);
    showToast(`${emoji} copied!`);
  });
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  // OLD
  //setTimeout(() => t.classList.remove('show'), 750);
  //Increated Timing
  setTimeout(() => t.classList.remove('show'), 750);
}

document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => render(e.target.value, currentFilter), 120);
});

loadEmojis();
</script>
